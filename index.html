<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>TEATINOS GYM</h1>

    <a href="https://www.youtube.com/">Home</a>
    <a href="https://www.youtube.com/">Register</a>
    <a href="https://www.youtube.com/">Contact</a>

    <h3 strong>Registration form</h3>

    <form action="https://teatinoswebpage.com">
        <fieldset>
            <p>
                <label for="name">Name
                    <input id="name" name="name"/>
                </label>
            </p>

            <p>
                <label for="username">Username
                    <input id="username" name="username"/>
                </label>
            </p>

            <p>
                <label for="password">Password
                    <input id="password" name="password"/>
                </label>
            </p>

            <p>
                <label for="repeatpassword">Repeat password
                    <input id="repeatpassword" name="repeatpassword"/>
                </label>
            </p>

            <p>
                <label for="email">Email
                    <input id="email" name="email"/>
                </label>
            </p>

            <p>
                <label for="gender">Gender
                    <p>
                        <label><input type="radio" id="male" name="gender" value="male" checked/> Male</label>
                        <label><input type="radio" id="female" name="gender" value="male"/> Female</label>
                    </p>
                </label>
            </p>

            <p>
                <label for="telephone">Telephone
                    <input id="telephone" name="telephone"/>
                </label>
            </p>

            <p>
                <label for="country">Country
                    <select>
                        <option value="">Please choose a country</option>
                        <option value="romania">Romania</option>
                        <option value="spain">Spain</option>
                    </select>
                </label>
            </p>

            <p>
                <label for="buttons">
                    <input type="submit" id="but" name="but" value="Hey"/>
                </label>
            </p>
            
        </fieldset>
    </form>

</body>
</html>
